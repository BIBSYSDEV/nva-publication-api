configurations {
    xjc
}

dependencies {
    api(libs.xsd2java.jakarta)
    runtimeOnly(libs.xsd2java.api)
    runtimeOnly(libs.xsd2java.impl)
    runtimeOnly(libs.xsd2java.xjc)
    testRuntimeOnly(libs.aws.sdk2.third.party.jackson.core)
    testRuntimeOnly(libs.jackson.dataformat.cbor)
    testRuntimeOnly(nvaCatalog.aws.sdk.s3)
    testRuntimeOnly(nvaCatalog.datafaker)
    testRuntimeOnly(nvaCatalog.jackson.core)
    testRuntimeOnly(nvaCatalog.jackson.databind)
    xjc(libs.xsd2java.activation)
    xjc(libs.xsd2java.api)
    xjc(libs.xsd2java.impl)
    xjc(libs.xsd2java.jakarta)
    xjc(libs.xsd2java.xjc)
}

@CacheableTask
abstract class Xsd2Pojo extends DefaultTask {

    @InputFile
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract RegularFileProperty getBindingFile()

    @Input
    abstract Property<String> getSchemaUri();

    @Classpath
    abstract ConfigurableFileCollection getXjcClasspath()

    @OutputDirectory
    abstract DirectoryProperty getOutputDir()

    @TaskAction
    void generate() {
        getOutputDir().get().asFile.mkdirs()
        def normalizedClasspath = getXjcClasspath().files.toSorted()

        ant.taskdef(
                name: 'xjc',
                classname: 'com.sun.tools.xjc.XJC2Task',
                classpath: normalizedClasspath.collect { it.absolutePath }.join(File.pathSeparator)
                )
        ant.xjc(
                destdir: getOutputDir().get().asFile,
                package: 'no.scopus.generated',
                schema: getSchemaUri().get(),
                binding: getBindingFile().get().asFile.path
                )
    }
}

def xsd2java = tasks.register('xsd2java', Xsd2Pojo) {
    schemaUri = 'https://schema.elsevier.com/dtds/document/abstracts/xocs-ani515.xsd'
    bindingFile = file('src/main/resources/xocs-ani515.xjb')
    xjcClasspath = configurations.xjc
    outputDir = layout.buildDirectory.dir('generated/sources/xjc')
}

sourceSets.main.java.srcDir(xsd2java.flatMap { it.outputDir })

tasks.withType(Jar).configureEach {
    outputs.cacheIf { true }
}

tasks.withType(Pmd).configureEach {
    exclude { '**/generated/*' }
}
