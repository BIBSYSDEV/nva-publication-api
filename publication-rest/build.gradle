dependencies {
    //This package is added by SAM template in the runtime environment
    api(project(':publication-commons')) {
        exclude group: "software.amazon.ion", module: "ion-java"
    }
    api(nvaCatalog.aws.lambda.core)
    api(nvaCatalog.aws.sdk2.dynamo)
    api(nvaCatalog.aws.sdk2.eventbridge)
    api(nvaCatalog.aws.sdk2.s3)
    api(nvaCatalog.aws.sdk2.secrets)
    api(nvaCatalog.jackson.annotations)
    api(nvaCatalog.jackson.databind)
    api(nvaLibs.apigateway)
    api(nvaLibs.auth)
    api(nvaLibs.clients)
    api(nvaLibs.core)
    api(nvaLibs.identifiers)
    api(nvaLibs.json)
    api(nvaLibs.secrets)
    api(project(":publication-model"))
    compileOnly(nvaCatalog.aws.sdk.apigateway) {
        because "PMD complains for the com/amazonaws/regions/Regions class"
    }
    compileOnly(libs.xsd2java.jakarta)
    implementation(libs.jakarta.validation.api)
    implementation(libs.nva.doi.partner.data)
    implementation(nvaCatalog.aws.sdk2.auth)
    implementation(nvaCatalog.aws.sdk2.dynamodbenhanced)
    implementation(nvaCatalog.aws.sdk2.regions)
    implementation(nvaCatalog.httpcore4)
    implementation(nvaCatalog.httpcore5)
    implementation(nvaCatalog.jackson.core)
    implementation(nvaCatalog.log4j.core)
    implementation(nvaCatalog.slf4j.api)
    implementation(project(":publication-event-handlers"))
    implementation(project(':datacite-commons'))
    implementation(project(':schema-org-metadata'))
    runtimeOnly(libs.apache.bval)
    runtimeOnly(libs.jaxb.runtime)
    runtimeOnly(libs.xsd2java.api)
    runtimeOnly(nvaCatalog.aws.sdk.dynamo)
    runtimeOnly(nvaCatalog.aws.sdk2.urlconnection)
    runtimeOnly(nvaCatalog.log4j.api)
    runtimeOnly(nvaCatalog.log4j.slf4j.impl)
    testImplementation(nvaCatalog.aws.dynamodb.local) {
        exclude group: 'com.amazonaws', module: 'aws-java-sdk-dynamodb'
        exclude group: 'com.amazonaws', module: 'aws-java-sdk-core'
    }
    testImplementation(nvaCatalog.aws.sdk2.sdk.core)
    testImplementation(nvaCatalog.commons.lang)
    testImplementation(nvaCatalog.hamcrest)
    testImplementation(nvaCatalog.javers)
    testImplementation(nvaCatalog.junit.jupiter.api)
    testImplementation(nvaCatalog.junit.jupiter.params)
    testImplementation(nvaCatalog.mockito.core)
    testImplementation(nvaCatalog.mockito.junit.jupiter)
    testImplementation(nvaCatalog.wiremock.core)
    testImplementation(nvaCatalog.wiremock.junit5)
    testImplementation(nvaCatalog.zalando)
    testImplementation(nvaLibs.logutils)
    testImplementation(nvaLibs.testutils)
    testImplementation(project(":publication-model-testing"))
    testImplementation(project(":publication-testing"))
    testImplementation(project(":tickets-test"))
    testRuntimeOnly(nvaCatalog.aws.java.sdk.core)
    testRuntimeOnly(nvaCatalog.junit.jupiter.engine)
    testRuntimeOnly(nvaCatalog.junit.platform.launcher)
    testRuntimeOnly(nvaCatalog.wiremock)
}

test {
    environment "ALLOWED_ORIGIN", "*"
    environment "AWS_REGION", "eu-west-1"
    environment "COGNITO_HOST", "https://example.com"
    environment "ID_NAMESPACE", "https://www.example.org/publication"
    environment "BACKEND_CLIENT_SECRET_NAME", "secret"
    environment "TABLE_NAME", "ResourcesTable"
    environment "BACKEND_CLIENT_AUTH_URL", "https://auth.example.com"
    environment "EXTERNAL_USER_POOL_URI", "https://external-user-pool.example.com"
    environment "API_HOST", "localhost"
    environment "CUSTOM_DOMAIN_BASE_PATH", "publication"
    environment "DOMAIN_NAME", "example.com"
    environment "IMPORT_CANDIDATES_TABLE_NAME", "import-candidates-table"
    environment "RESOURCE_TABLE_NAME", "publications-table"
    environment "NVA_PERSISTED_STORAGE_BUCKET_NAME", "some-persisted-bucket"
    environment "IMPORT_CANDIDATES_STORAGE_BUCKET", "some-candidate-bucket"
    environment "NVA_EVENT_BUS_NAME" , "some-nva-event-bus"
    environment "COGNITO_AUTHORIZER_URLS", "http://localhost:3000"
}
