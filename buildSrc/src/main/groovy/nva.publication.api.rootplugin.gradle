plugins {
    id 'nva.root-module-conventions'
}

nva {
    dependencyAnalysis {
        enforced = false
    }
    generatedCode = [
        'no/scopus/generated/**',
        'no/unit/nva/model/testing/**'
    ]
    spectral {
        documents = ['docs/*.yaml']
        rulesetFile = file('.spectral.yaml')
    }
    jacoco {
        // FIXME: Remove dead code and add tests for remaining gaps
        minMethodCoverage = new BigDecimal('0.970')
        minClassCoverage = new BigDecimal('0.970')
    }
}
