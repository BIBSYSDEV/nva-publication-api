plugins {
    id 'nva.java-conventions'
    id 'java-test-fixtures'
}

nva {
    generatedCode = [
        'no/scopus/generated/**',
        'no/unit/nva/model/testing/**'
    ]
    pmd {
        rulesetFile = rootProject.file('config/pmd/ruleset.xml')
    }
}

dependencies {
    implementation(platform(nvaCatalog.aws.sdk.bom))
    implementation(platform(nvaCatalog.aws.sdk2.bom))
    testImplementation(platform(nvaCatalog.junit.bom))
}

tasks.named('test') {
    environment("API_HOST", "localhost")
}

tasks.withType(JavaCompile).configureEach {
    // Disabled because of a bug in ErrorProne (https://github.com/google/error-prone/issues/4918)
    options.errorprone.disable("StringConcatToTextBlock")
}
