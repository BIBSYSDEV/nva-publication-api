plugins {
    id "com.github.gmazzo.buildconfig" version '6.0.9'
}

dependencies {
    api(nvaCatalog.commons.validator)
    api(nvaCatalog.jackson.annotations)
    api(nvaCatalog.jackson.databind)
    api(nvaCatalog.slf4j.api)
    api(nvaLibs.core)
    api(nvaLibs.identifiers)
    api(nvaLibs.json)
    implementation(nvaCatalog.jackson.core)
    implementation(nvaCatalog.log4j.core)
    runtimeOnly(nvaCatalog.log4j.api)
    runtimeOnly(nvaCatalog.log4j.slf4j.impl)
    testFixturesRuntimeOnly(nvaCatalog.jackson.core)
    testImplementation(libs.glassfish.jakarta.json)
    testImplementation(libs.reflections)
    testImplementation(libs.swagger.core)
    testImplementation(libs.swagger.models)
    testImplementation(libs.titanium.json.ld)
    testImplementation(nvaCatalog.hamcrest)
    testImplementation(nvaCatalog.javers)
    testImplementation(nvaCatalog.jena.arq)
    testImplementation(nvaCatalog.jena.core)
    testImplementation(nvaCatalog.junit.jupiter.api)
    testImplementation(nvaCatalog.junit.jupiter.params)
    testImplementation(nvaLibs.logutils)
    testImplementation(nvaLibs.testutils)
    testImplementation(project(":publication-model-testing"))
    testRuntimeOnly(nvaCatalog.junit.jupiter.engine)
    testRuntimeOnly(nvaCatalog.junit.platform.launcher)
}

test {
    environment "ID_NAMESPACE", "https://www.example.org"
}

def modelVersion = '0.23.3'

buildConfig {
    className("ResourcesBuildConfig")   // forces the class name. Defaults to 'BuildConfig'
    packageName("no.unit.nva.model.config")  // forces the package. Defaults to '${project.group}'
    useJavaOutput() //forces the output to be Java
    buildConfigField("String", "RESOURCES_MODEL_VERSION", "\"${modelVersion}\"")
}
